version: 2

before:
  hooks:
    - ./scripts/manpages.sh

builds:
  - id: emu
    binary: emu
    main: ./cmd/emu
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: emu
    name_template: "emu_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    ids:
      - emu
    # Flat archive so cask manpage/binary paths match extract layout.
    wrap_in_directory: false
    files:
      - LICENSE
      - README.md
      - manpages/*
    format_overrides:
      - goos: windows
        formats: zip

changelog:
  disable: true

homebrew_casks:
  - name: emu
    ids:
      - emu
    repository:
      owner: bartekpacia
      name: homebrew-tools
    directory: Casks
    homepage: https://github.com/bartekpacia/emu
    description: Handy mini-CLI for more pleasant work with Android Emulator
    license: MIT
    manpages:
      - manpages/emu.1.gz
    # urfave/cli: `emu completion <shell>` — omit shell_parameter_format
    # so Homebrew passes the shell name as a plain positional argument.
    generate_completions_from_executable:
      executable: emu
      args:
        - completion
      shells:
        - bash
        - zsh
        - fish

aurs:
  - name: emu-bin
    ids:
      - emu
    homepage: https://github.com/bartekpacia/emu
    description: Handy mini-CLI for more pleasant work with Android Emulator
    maintainers:
      - Bartek Pacia <barpac02@gmail.com>
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: git@github.com:bartekpacia/aur.git
    directory: emu-bin
    package: |
      # bin
      install -Dm755 emu "${pkgdir}/usr/bin/emu"

      # license
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/emu/LICENSE"

      # man pages
      install -Dm644 manpages/emu.1.gz "${pkgdir}/usr/share/man/man1/emu.1.gz"
